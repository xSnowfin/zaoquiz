<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蔵王ジャンプ台AR謎解き</title>
  <link rel="stylesheet" href="css/zao.css">
</head>
<body>

  <div id="app">

    <!-- タイトル -->
    <section id="title-screen" class="screen active">
      <h1>蔵王ジャンプ台<br>AR謎解きゲーム</h1>
      <button id="start-btn">スタート</button>
    </section>

    <!-- ゲーム画面 -->
    <section id="game-screen" class="screen hidden">

      <!-- ステージ表示 -->
      <div id="stage-info"></div>

      <!-- 問題エリア -->
      <div id="content-area"></div>

      <!-- 入力 -->
      <div id="input-area">
        <input type="text" id="answer-input" placeholder="答えを入力">
        <button id="submit-btn">送信</button>
      </div>

      <!-- メッセージ -->
      <div id="message"></div>

    </section>

  </div>

  <!-- JS -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
  <script>
    console.log("JS読み込みOK");
  </script>

</body>
</html>
