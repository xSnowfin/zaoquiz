<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蔵王ジャンプ台フェスティバル 謎解きクイズラリー！</title>
  <link rel="stylesheet" href="zao.css">
</head>
<body>
  <div id="title-screen">

    <div class="overlay"></div>

    <div class="title-content">

        <h1>怪盗Xと消えた金メダル</h1>

        <h2>AR謎解きアドベンチャー</h2>

        <p class="story">
            怪盗Xに伝説の金メダルが盗まれた。<br>
            会場に残された謎を解き、<br>
            家族みんなで怪盗Xを追いかけよう！
        </p>

        <button id="startBtn">
            ▶ GAME START
        </button>

    </div>

</div>

<div class="container" id="main-container" style="display:none;">
    <div id="keyword-message"></div>
  <!-- 効果音 -->
  <audio id="correct-sound" src="sounds/correct.mp3" preload="auto"></audio>
  <audio id="wrong-sound" src="sounds/wrong.mp3" preload="auto"></audio>
  <audio id="goal-sound" src="sounds/goal.mp3" preload="auto"></audio>

  <!-- 紙吹雪ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="zao.js"></script>
  <!-- 画面下部に獲得キーワードを出す領域 -->
  <div id="collected-keywords-bottom" aria-live="polite"></div>
</body>
</html>
